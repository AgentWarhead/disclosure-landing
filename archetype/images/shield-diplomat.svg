<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <filter id="glow-d" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="dg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#0D7A00"/>
    </linearGradient>
  </defs>
  <path d="M100 10 L185 50 L185 140 Q185 200 100 230 Q15 200 15 140 L15 50 Z" 
        stroke="url(#dg)" stroke-width="3" fill="none" filter="url(#glow-d)" opacity="0.9"/>
  <path d="M100 20 L175 55 L175 138 Q175 192 100 220 Q25 192 25 138 L25 55 Z" 
        stroke="#39FF14" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Dove -->
  <g transform="translate(100,115)" filter="url(#glow-d)">
    <!-- Wings spread -->
    <path d="M-5,-20 Q-55,-45 -60,-10 Q-45,-5 -25,5 Z" fill="#39FF14" opacity="0.7"/>
    <path d="M5,-20 Q55,-45 60,-10 Q45,-5 25,5 Z" fill="#39FF14" opacity="0.7"/>
    <!-- Body -->
    <ellipse cx="0" cy="5" rx="14" ry="25" fill="#39FF14" opacity="0.6"/>
    <!-- Head -->
    <circle cx="0" cy="-25" r="10" fill="#4AFF4A" opacity="0.8"/>
    <!-- Beak -->
    <path d="M10,-25 L20,-22 L10,-20" fill="#39FF14" opacity="0.9"/>
    <!-- Olive branch -->
    <path d="M-5,25 Q-25,40 -35,35" stroke="#39FF14" stroke-width="1.5" fill="none" opacity="0.5"/>
    <ellipse cx="-30" cy="33" rx="6" ry="3" fill="#39FF14" opacity="0.4" transform="rotate(-20,-30,33)"/>
    <ellipse cx="-22" cy="37" rx="5" ry="2.5" fill="#39FF14" opacity="0.4" transform="rotate(-10,-22,37)"/>
  </g>
  <circle cx="100" cy="15" r="3" fill="#39FF14" opacity="0.6"/>
  <circle cx="30" cy="55" r="2.5" fill="#39FF14" opacity="0.4"/>
  <circle cx="170" cy="55" r="2.5" fill="#39FF14" opacity="0.4"/>
  <circle cx="100" cy="225" r="3" fill="#39FF14" opacity="0.6"/>
</svg>
