<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <filter id="glow-g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#996600"/>
    </linearGradient>
    <radialGradient id="starglow">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <path d="M100 10 L185 50 L185 140 Q185 200 100 230 Q15 200 15 140 L15 50 Z" 
        stroke="url(#gg)" stroke-width="3" fill="none" filter="url(#glow-g)" opacity="0.9"/>
  <path d="M100 20 L175 55 L175 138 Q175 192 100 220 Q25 192 25 138 L25 55 Z" 
        stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Cosmic Star -->
  <g transform="translate(100,115)" filter="url(#glow-g)">
    <!-- Ambient glow -->
    <circle cx="0" cy="0" r="45" fill="url(#starglow)"/>
    <!-- Orbital rings -->
    <ellipse cx="0" cy="0" rx="40" ry="12" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.3" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="40" ry="12" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.3" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="40" ry="12" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.3" transform="rotate(90)"/>
    <!-- Star burst -->
    <polygon points="0,-30 5,-10 25,-15 10,-2 20,18 0,8 -20,18 -10,-2 -25,-15 -5,-10" 
             fill="#FFD700" opacity="0.85"/>
    <!-- Inner core -->
    <circle cx="0" cy="0" r="8" fill="#FFEC80" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF" opacity="0.7"/>
    <!-- Cross flares -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#FFD700" stroke-width="1" opacity="0.2"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#FFD700" stroke-width="1" opacity="0.2"/>
  </g>
  <circle cx="100" cy="15" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="30" cy="55" r="2.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="170" cy="55" r="2.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="100" cy="225" r="3" fill="#FFD700" opacity="0.6"/>
</svg>
