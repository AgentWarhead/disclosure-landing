<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <filter id="glow-o" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="og" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
  </defs>
  <path d="M100 10 L185 50 L185 140 Q185 200 100 230 Q15 200 15 140 L15 50 Z" 
        stroke="url(#og)" stroke-width="3" fill="none" filter="url(#glow-o)" opacity="0.9"/>
  <path d="M100 20 L175 55 L175 138 Q175 192 100 220 Q25 192 25 138 L25 55 Z" 
        stroke="#F97316" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Wolf Head -->
  <g transform="translate(100,110)" filter="url(#glow-o)">
    <!-- Ears -->
    <path d="M-30,-45 L-22,-15 L-38,-20 Z" fill="#F97316" opacity="0.7"/>
    <path d="M30,-45 L22,-15 L38,-20 Z" fill="#F97316" opacity="0.7"/>
    <!-- Head shape -->
    <path d="M-28,-20 Q-35,5 -20,25 L0,45 L20,25 Q35,5 28,-20 Q20,-35 0,-35 Q-20,-35 -28,-20 Z" 
          fill="#F97316" opacity="0.6"/>
    <!-- Eyes -->
    <ellipse cx="-14" cy="-8" rx="5" ry="3.5" fill="#FFB800" opacity="0.95"/>
    <ellipse cx="14" cy="-8" rx="5" ry="3.5" fill="#FFB800" opacity="0.95"/>
    <circle cx="-14" cy="-8" r="2" fill="#FF6600"/>
    <circle cx="14" cy="-8" r="2" fill="#FF6600"/>
    <!-- Snout -->
    <path d="M-8,8 L0,18 L8,8" fill="#FF8C00" opacity="0.5"/>
    <ellipse cx="0" cy="14" rx="3" ry="2" fill="#FFB800" opacity="0.8"/>
    <!-- Muzzle lines -->
    <path d="M-12,5 L-8,12" stroke="#F97316" stroke-width="1" opacity="0.3"/>
    <path d="M12,5 L8,12" stroke="#F97316" stroke-width="1" opacity="0.3"/>
  </g>
  <circle cx="100" cy="15" r="3" fill="#F97316" opacity="0.6"/>
  <circle cx="30" cy="55" r="2.5" fill="#F97316" opacity="0.4"/>
  <circle cx="170" cy="55" r="2.5" fill="#F97316" opacity="0.4"/>
  <circle cx="100" cy="225" r="3" fill="#F97316" opacity="0.6"/>
</svg>
