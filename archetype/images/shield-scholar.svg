<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <filter id="glow-c" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00DDFF"/>
      <stop offset="100%" stop-color="#004466"/>
    </linearGradient>
  </defs>
  <path d="M100 10 L185 50 L185 140 Q185 200 100 230 Q15 200 15 140 L15 50 Z" 
        stroke="url(#cg)" stroke-width="3" fill="none" filter="url(#glow-c)" opacity="0.9"/>
  <path d="M100 20 L175 55 L175 138 Q175 192 100 220 Q25 192 25 138 L25 55 Z" 
        stroke="#00BFFF" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- All-Seeing Eye -->
  <g transform="translate(100,112)" filter="url(#glow-c)">
    <!-- Eye outline -->
    <path d="M-50,0 Q0,-40 50,0 Q0,40 -50,0 Z" stroke="#00DDFF" stroke-width="2.5" fill="none" opacity="0.8"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="18" stroke="#00DDFF" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="8" fill="#00DDFF" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#00EEFF" opacity="1"/>
    <!-- Rays -->
    <line x1="0" y1="-50" x2="0" y2="-35" stroke="#00DDFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="35" x2="0" y2="50" stroke="#00DDFF" stroke-width="1.5" opacity="0.4"/>
    <line x1="-35" y1="-25" x2="-25" y2="-18" stroke="#00DDFF" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="-25" x2="25" y2="-18" stroke="#00DDFF" stroke-width="1" opacity="0.3"/>
    <line x1="-35" y1="25" x2="-25" y2="18" stroke="#00DDFF" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="25" x2="25" y2="18" stroke="#00DDFF" stroke-width="1" opacity="0.3"/>
    <!-- Concentric data rings -->
    <circle cx="0" cy="0" r="28" stroke="#00DDFF" stroke-width="0.5" fill="none" opacity="0.25" stroke-dasharray="3 5"/>
    <circle cx="0" cy="0" r="38" stroke="#00DDFF" stroke-width="0.5" fill="none" opacity="0.15" stroke-dasharray="2 4"/>
  </g>
  <circle cx="100" cy="15" r="3" fill="#00DDFF" opacity="0.6"/>
  <circle cx="30" cy="55" r="2.5" fill="#00DDFF" opacity="0.4"/>
  <circle cx="170" cy="55" r="2.5" fill="#00DDFF" opacity="0.4"/>
  <circle cx="100" cy="225" r="3" fill="#00DDFF" opacity="0.6"/>
</svg>
